name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" -not -path "./.git/*" | while read f; do
            echo "  Checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "  ✓ $f" || exit 1
          done

      - name: Lint JavaScript (API functions)
        run: |
          echo "Installing ESLint..."
          npm install -g eslint
          echo "Linting API files..."
          eslint api/**/*.js --env node,es2022 --parser-options=ecmaVersion:2022 \
            --rule '{"no-undef": "warn", "no-unused-vars": "warn"}' \
            --ignore-pattern 'node_modules/' || true

      - name: Security audit (API files)
        run: |
          echo "Checking for common security issues..."
          # Check for hardcoded secrets patterns
          if grep -rn "password\s*=\s*['\"][^'\"]\|api_key\s*=\s*['\"][^'\"]\|secret\s*=\s*['\"][^'\"]" api/ 2>/dev/null; then
            echo "⚠️  Warning: Possible hardcoded credentials detected"
          else
            echo "✓ No obvious hardcoded secrets found"
          fi

      - name: Verify Vercel config
        run: |
          echo "Checking vercel.json..."
          if [ -f vercel.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8'))" && echo "✓ vercel.json is valid"
          fi

  # Vercel deploys automatically on push via GitHub integration
  deploy-status:
    name: Deploy Info
    runs-on: ubuntu-latest
    needs: lint-and-validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deployment note
        run: |
          echo "✅ CI passed. Vercel will auto-deploy this push."
          echo "Check deployment at: https://vercel.com/dashboard"
